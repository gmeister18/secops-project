name: Code Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev
      
      - name: Run Bandit (Security Audit)
        continue-on-error: true
        run: |
          poetry run bandit -r src/ main.py -f json -o bandit-report.json 2>/dev/null || true
          poetry run bandit -r src/ main.py || true
      
      - name: Run Safety (Dependency Vulnerabilities)
        continue-on-error: true
        run: |
          poetry run safety check --continue-on-error || true
      
      - name: Run Ruff (Linting & Formatting Check)
        continue-on-error: true
        run: |
          poetry run ruff check src/ main.py tests/ || true
          poetry run ruff format --check src/ main.py tests/ || true
      
      - name: Upload Bandit report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ matrix.python-version }}
          path: bandit-report.json
      
      - name: Print logs
        if: always()
        run: |
          echo "=== Python Version ===" 
          python --version
          echo "=== Poetry Lock ===" 
          poetry lock --check || true
