name: Code Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev
      
      - name: Run Bandit (Security Audit)
        run: |
          poetry run bandit -r src/ main.py -f json -o bandit-report.json || true
          poetry run bandit -r src/ main.py
      
      - name: Run Safety (Dependency Vulnerabilities)
        run: |
          poetry run safety check --json --output safety-report.json || true
          poetry run safety check
      
      - name: Run Ruff (Linting & Formatting Check)
        run: |
          poetry run ruff check src/ main.py tests/
          poetry run ruff format --check src/ main.py tests/
      
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports-${{ matrix.python-version }}
          path: |
            bandit-report.json
            safety-report.json
